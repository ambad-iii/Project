<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Details</title>
    <link rel="stylesheet" href="{{url_for('static',filename='admin_style.css')}}">

</head>
<body>
  <div class="sidebar">

    <h2>Admin Panel</h2>

    <a href="/admin_dashboard">Dashboard</a>
    <a href="/admin_students">Students</a>
    <a href="/admin_recruiters">Recruiters</a>
    <a href="/admin_analytics">Analytics</a>
    <a href="/admin_reports">Reports</a>

</div>

<div class="content">

    <h1>Student Management</h1>

    <table>
        <tr>
            <th>Roll NO</th>
            <th>NAME</th>
            <th>DEPARTEMNT</th>
            <th>CGPA</th>
            <th>STATUS</th>
        </tr>
        {% for student in students %}
        <tr>
            <td>{{ student.roll_no }}</td>
            <td>{{ student.name }}</td>
            <td>{{ student.department }}</td>
            <td>{{ student.cgpa }}</td>
            <td>{{ student.status }}</td>
         </tr>
        {% endfor %}
    </table>

</div>

</body>
</html>
