<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recruiter Details</title>
    <link rel="stylesheet" href="{{url_for('static',filename='admin_style.css')}}">

</head>
<body>
   <div class="sidebar">

    <h2>Admin Panel</h2>

    <a href="/admin_dashboard">Dashboard</a>
    <a href="/admin_students">Students</a>
    <a href="/admin_recruiters">Recruiters</a>
    <a href="/admin_analytics">Analytics</a>
    <a href="/admin_reports">Reports</a>

</div>

<div class="content">

    <h1>Recruiter Management</h1>

    <table>
    <tr>
        <th>Company</th>
        <th>Industry</th>
        <th>Status</th>
        <th>Action</th>
    </tr>

    {% for r in recruiters %}
    <tr>
        <td>{{ r.company }}</td>
        <td>{{ r.name }}</td>
        <td id="status{{ r.id }}">{{ r.status }}</td>
        <td>
            <button onclick="approve('status{{ r.id }}')">Approve</button>
            <button onclick="suspend('status{{ r.id }}')">Suspend</button>
        </td>
    </tr>
    {% endfor %}
</table>

</div>

<script src="{{url_for('static',filename='admin_javascript.js')}}"></script>
</body>
</html>
