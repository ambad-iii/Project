<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
     <link rel="stylesheet" href="{{url_for('static',filename='admin_style.css')}}">
</head>
<body>
   <div class="sidebar">

    <h2>Admin Panel</h2>

    <a href="/admin_dashboard">Dashboard</a>
    <a href="/admin_students">Students</a>
    <a href="/admin_recruiters">Recruiters</a>
    <a href="/admin_analytics">Analytics</a>
    <a href="/admin_reports">Reports</a>

</div>

<div class="content">

    <h1>Placement Officer Dashboard</h1>

    <div class="card">
        <h2>Total Students</h2>
        <p>{{ students|length }}</p>
    </div>

    <div class="card">
        <h2>Total Recruiters</h2>
        <p>{{ recruiters|length }}</p>
    </div>

    <div class="card">
        <h2>Jobs Posted</h2>
        <p>{{ jobs|length }}</p>
    </div>

    <div class="card">
        <h2>Applications</h2>
        <p>{{ applications|length }}</p>
    </div>

</div>
</body>
</html>
